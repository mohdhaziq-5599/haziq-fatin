<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Red to Yellow</title>
<style>
  /* The animation code */
  @keyframes example {
    from { background-color: red; }
    to { background-color: yellow; }
  }

  /* The element to apply the animation to */
  div {
    width: 100px;
    height: 100px;
    background-color: red;
    animation-name: example;
    animation-duration: 4s;
    animation-fill-mode: forwards; /* keeps the final color (yellow) */
  }
</style>
</head>
<body>

<div></div>

</body>
</html>
