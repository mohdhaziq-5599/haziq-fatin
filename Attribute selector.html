<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stylish Link Pseudo-Classes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .box {
      border: 2px solid #333;
      padding: 20px;
      width: 200px;
      text-align: center;
      border-radius: 8px;
    }

    .box h3 {
      margin-bottom: 15px;
    }

    /* Link state */
    .link-demo a:link {
      display: inline-block;
      padding: 10px 15px;
      background-color: blue;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    /* Visited state */
    .visited-demo a:visited {
      color: red;
      font-weight: bold;
    }

    /* Hover state */
    .hover-demo a:hover {
      color: purple;
      font-size: 18px;
    }

    /* Active state */
    .active-demo a:active {
      color: orange;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box link-demo">
    <h3>Link (:link)</h3>
    <a href="https://www.example.com" target="_blank">Click Me</a>
  </div>

  <div class="box visited-demo">
    <h3>Visited (:visited)</h3>
    <a href="https://www.example.com" target="_blank">Already Clicked</a>
  </div>

  <div class="box hover-demo">
    <h3>Hover (:hover)</h3>
    <a href="https://www.example.com" target="_blank">Hover Me</a>
  </div>

  <div class="box active-demo">
    <h3>Active (:active)</h3>
    <a href="https://www.example.com" target="_blank">Click Me</a>
  </div>
</body>
</html>
