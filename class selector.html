<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector Example</title>
    <style>
        /* Class selector starts with a dot (.) */
        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1 class="highlight">This heading has a class "highlight"</h1>
    <p class="highlight">This paragraph also has the class "highlight"</p>
    <p>This paragraph does NOT have the class, so it won’t be highlighted.</p>
</body>
</html>
